name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  # ─────────────────────────────────────────────
  # STAGE 1: BUILD
  # ─────────────────────────────────────────────
  build-frontend:
    name: "Build — Frontend (Vite)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Upload frontend build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/
          retention-days: 1

  # ─────────────────────────────────────────────
  # STAGE 2: TEST
  # ─────────────────────────────────────────────
  test-backend:
    name: "Test — Backend (pytest)"
    runs-on: ubuntu-latest
    needs: [build-frontend]
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: ${{ secrets.TEST_DB_USER || 'test_user' }}
          POSTGRES_PASSWORD: ${{ secrets.TEST_DB_PASSWORD }}
          POSTGRES_DB: chocolate_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql+asyncpg://test_user:${{ secrets.TEST_DB_PASSWORD }}@localhost:5432/chocolate_test
      SECRET_KEY: ${{ secrets.TEST_SECRET_KEY }}
      ENVIRONMENT: test
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install backend dependencies
        working-directory: backend
        run: pip install -r requirements.txt

      - name: Run pytest
        working-directory: backend
        run: pytest --tb=short -q

  test-frontend:
    name: "Test — Frontend (Playwright)"
    runs-on: ubuntu-latest
    needs: [build-frontend]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Install Playwright browsers
        working-directory: frontend
        run: npx playwright install --with-deps chromium

      - name: Run Playwright tests
        working-directory: frontend
        run: npx playwright test

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 7

  # ─────────────────────────────────────────────
  # STAGE 3: VALIDATION (lint + type-check)
  # ─────────────────────────────────────────────
  validate-backend:
    name: "Validate — Backend (ruff + pyright)"
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install backend dependencies
        working-directory: backend
        run: pip install -r requirements.txt

      - name: Run ruff (lint)
        working-directory: backend
        run: ruff check .

      - name: Run ruff (format check)
        working-directory: backend
        run: ruff format --check .

      - name: Run pyright (type-check)
        working-directory: backend
        run: pyright

  validate-frontend:
    name: "Validate — Frontend (tsc + ESLint)"
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Run TypeScript type-check
        working-directory: frontend
        run: npx tsc --noEmit

      - name: Run ESLint
        working-directory: frontend
        run: npx eslint . --max-warnings 0

  # ─────────────────────────────────────────────
  # STAGE 4: SECURITY
  # ─────────────────────────────────────────────
  security:
    name: "Security — pip-audit + secret scan"
    runs-on: ubuntu-latest
    needs: [validate-backend, validate-frontend]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install pip-audit
        run: pip install pip-audit

      - name: Run pip-audit (blocks on any known vulnerability)
        working-directory: backend
        run: pip-audit -r requirements.txt --strict

      - name: Check for committed secrets (gitleaks)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ─────────────────────────────────────────────
  # STAGE 5: ARTIFACT BUILD
  # ─────────────────────────────────────────────
  build-images:
    name: "Artifact — Build Docker images"
    runs-on: ubuntu-latest
    needs: [security]
    outputs:
      frontend_tag: ${{ steps.meta-frontend.outputs.version }}
      backend_tag: ${{ steps.meta-backend.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Generate frontend image metadata
        id: meta-frontend
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}/frontend
          tags: |
            type=sha,format=long
            type=ref,event=branch

      - name: Generate backend image metadata
        id: meta-backend
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}/backend
          tags: |
            type=sha,format=long
            type=ref,event=branch

      - name: Build frontend Docker image (no push)
        uses: docker/build-push-action@v5
        with:
          context: frontend
          file: frontend/Dockerfile
          push: false
          tags: ${{ steps.meta-frontend.outputs.tags }}
          labels: ${{ steps.meta-frontend.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build backend Docker image (no push)
        uses: docker/build-push-action@v5
        with:
          context: backend
          file: backend/Dockerfile
          push: false
          tags: ${{ steps.meta-backend.outputs.tags }}
          labels: ${{ steps.meta-backend.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─────────────────────────────────────────────
  # STAGE 6: DEPLOY — human-triggered only
  # Pipeline confirms readiness; deployment is NOT automated.
  # Triggered separately via workflow_dispatch on deploy.yml.
  # ─────────────────────────────────────────────
  pipeline-ready:
    name: "Pipeline — Ready for deployment"
    runs-on: ubuntu-latest
    needs: [build-images]
    steps:
      - name: All stages passed
        run: echo "Pipeline passed. Deployment must be triggered manually by a human."
